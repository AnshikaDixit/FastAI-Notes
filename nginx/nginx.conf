# nginx/nginx.conf
# Nginx acts as a reverse proxy: it accepts requests on port 80
# and forwards them to the FastAPI container on port 8000 (internal network only)

upstream fastapi_app {
    server api:8000;
    # 'api' is the Docker Compose service name — Docker's internal DNS resolves it
    # to the api container's IP automatically
}

server {
    listen 80;

    location / {
        proxy_pass http://fastapi_app;

        # Pass the real client IP to FastAPI (otherwise it always sees Nginx's IP)
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}